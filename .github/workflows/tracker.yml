name: Daily Investment Tracker

on:
  schedule:
    - cron: '45 1 * * 1-5' # Runs at 01:45 UTC (07:15 AM IST) Monday to Friday
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  run-tracker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Daily Tracker
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_APP_PASSWORD: ${{ secrets.SENDER_APP_PASSWORD }}
          RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
          PORTAL_MOBILE_URL: ${{ secrets.PORTAL_MOBILE_URL }}
          PORTAL_WEBSITE_URL: ${{ secrets.PORTAL_WEBSITE_URL }}
        run: node tracker.js
