<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📈 Mobile Portfolio Manager</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-color: #0b0f19;
      --card-bg: rgba(22, 30, 49, 0.75);
      --border-color: rgba(255, 255, 255, 0.08);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --primary: #3b82f6;
      --primary-hover: #2563eb;
      --success: #10b981;
      --success-hover: #059669;
      --danger: #ef4444;
      --danger-hover: #dc2626;
      --card-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Plus Jakarta Sans', 'Outfit', sans-serif;
      background-color: var(--bg-color);
      background-image: 
        radial-gradient(at 0% 0%, rgba(30, 58, 138, 0.4) 0px, transparent 50%),
        radial-gradient(at 100% 100%, rgba(88, 28, 135, 0.3) 0px, transparent 50%);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 15px;
    }

    .container {
      max-width: 500px;
      width: 100%;
    }

    header {
      text-align: center;
      margin-bottom: 25px;
      margin-top: 10px;
    }

    header h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 1.8rem;
      font-weight: 800;
      letter-spacing: -0.025em;
      background: linear-gradient(135deg, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 6px;
    }

    header p {
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    .card {
      background: var(--card-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 20px;
      box-shadow: var(--card-shadow);
      margin-bottom: 20px;
    }

    .card-title {
      font-family: 'Outfit', sans-serif;
      font-size: 1.2rem;
      font-weight: 600;
      margin-bottom: 15px;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 10px;
      color: var(--text-main);
    }

    .form-group {
      margin-bottom: 15px;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 15px;
    }

    label {
      display: block;
      color: var(--text-muted);
      font-size: 0.8rem;
      margin-bottom: 6px;
      font-weight: 500;
    }

    input, select {
      width: 100%;
      background-color: rgba(10, 15, 30, 0.8);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 12px;
      color: var(--text-main);
      font-family: inherit;
      font-size: 0.95rem;
      transition: all 0.2s ease;
    }

    input:focus, select:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.25);
    }

    button {
      cursor: pointer;
      font-family: inherit;
      font-weight: 600;
      border-radius: 8px;
      transition: all 0.2s ease;
      font-size: 0.9rem;
      border: none;
      width: 100%;
      padding: 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-primary {
      background-color: var(--primary);
      color: white;
      margin-top: 5px;
      box-shadow: 0 4px 10px rgba(59, 130, 246, 0.3);
    }

    .btn-primary:hover {
      background-color: var(--primary-hover);
    }

    .btn-danger {
      background-color: rgba(239, 68, 68, 0.15);
      color: #f87171;
      padding: 6px 12px;
      border: 1px solid rgba(239, 68, 68, 0.3);
      width: auto;
      font-size: 0.8rem;
    }

    .btn-danger:hover {
      background-color: var(--danger);
      color: white;
      border-color: var(--danger);
    }

    .stock-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.04);
    }

    .stock-item:last-child {
      border-bottom: none;
    }

    .stock-details {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .stock-name {
      font-weight: 600;
      color: var(--text-main);
      font-size: 0.95rem;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .exchange-tag {
      font-size: 0.7rem;
      background-color: rgba(59, 130, 246, 0.2);
      color: #93c5fd;
      padding: 2px 6px;
      border-radius: 4px;
      font-weight: bold;
    }

    .category-tag {
      font-size: 0.7rem;
      background-color: rgba(16, 185, 129, 0.15);
      color: #a7f3d0;
      padding: 2px 6px;
      border-radius: 4px;
    }

    .stock-price {
      font-family: 'Outfit', sans-serif;
      color: #38bdf8;
      font-size: 0.85rem;
      font-weight: 500;
    }

    .empty-state {
      text-align: center;
      padding: 30px 10px;
      color: var(--text-muted);
    }

    .empty-state-icon {
      font-size: 2.5rem;
      margin-bottom: 10px;
    }

    .loading-overlay {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 10px;
    }

    .spinner {
      width: 24px;
      height: 24px;
      border: 3px solid rgba(255, 255, 255, 0.1);
      border-radius: 50%;
      border-top-color: var(--primary);
      animation: spin 1s linear infinite;
      margin-bottom: 12px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Toast styling */
    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translate(-50%, 100px);
      background-color: #1e293b;
      border-left: 4px solid var(--primary);
      padding: 12px 20px;
      border-radius: 8px;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
      display: flex;
      align-items: center;
      gap: 10px;
      width: 90%;
      max-width: 400px;
      opacity: 0;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      z-index: 1000;
      font-size: 0.85rem;
    }

    .toast.show {
      transform: translate(-50%, 0);
      opacity: 1;
    }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <h1>📈 Mobile Portfolio</h1>
      <p>Save or delete stocks in your Excel Watchlist</p>
    </header>

    <!-- Form Card -->
    <div class="card">
      <div class="card-title">➕ Add Stock</div>
      
      <div class="form-group">
        <label for="stockSymbol">Stock Name / Symbol</label>
        <input type="text" id="stockSymbol" placeholder="e.g. Tata Motors, AAPL, Reliance">
      </div>
      
      <div class="form-row">
        <div>
          <label for="buyPrice">Buy Price (Optional)</label>
          <input type="number" id="buyPrice" placeholder="e.g. 980">
        </div>
        <div>
          <label for="exchange">Exchange</label>
          <select id="exchange">
            <option value="NSE" selected>NSE</option>
            <option value="BSE">BSE</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label for="category">Category</label>
        <input type="text" id="category" value="Indians" readonly style="opacity: 0.6; background-color: rgba(10,15,30,0.4);">
      </div>
      
      <button class="btn-primary" onclick="addStockItem()">💾 Save Stock</button>
    </div>

    <!-- Watchlist Card -->
    <div class="card">
      <div class="card-title">📋 Watchlist</div>
      
      <div id="loading" class="loading-overlay">
        <div class="spinner"></div>
        <p style="color: var(--text-muted); font-size: 0.85rem;">Connecting to Google Sheet...</p>
      </div>

      <div id="stocksListContainer" style="display: none;">
        <div id="stocksList"></div>
        <div id="emptyState" class="empty-state" style="display: none;">
          <div class="empty-state-icon">📂</div>
          <p style="font-size: 0.85rem;">Watchlist khali hai. Upar se stock add karein!</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast">
    <span id="toastIcon">ℹ️</span>
    <span id="toastMessage">Portfolio updated!</span>
  </div>

  <script>
    let activeStocks = [];

    // Load stocks from sheet on load
    window.onload = function() {
      loadStocksFromSheet();
    };

    function loadStocksFromSheet() {
      document.getElementById('loading').style.display = 'flex';
      document.getElementById('stocksListContainer').style.display = 'none';
      
      google.script.run
        .withSuccessHandler(function(response) {
          document.getElementById('loading').style.display = 'none';
          document.getElementById('stocksListContainer').style.display = 'block';
          
          if (response.success) {
            activeStocks = response.data;
            renderStocksList();
          } else {
            showToast('❌ Sheet error: ' + response.error, 'danger');
          }
        })
        .withFailureHandler(function(error) {
          document.getElementById('loading').style.display = 'none';
          showToast('❌ Connection error to Google App', 'danger');
        })
        .getStocks();
    }

    function renderStocksList() {
      const listDiv = document.getElementById('stocksList');
      const emptyState = document.getElementById('emptyState');
      
      listDiv.innerHTML = '';
      
      if (activeStocks.length === 0) {
        emptyState.style.display = 'block';
        return;
      }
      
      emptyState.style.display = 'none';
      
      activeStocks.forEach(function(stock) {
        const itemDiv = document.createElement('div');
        itemDiv.className = 'stock-item';
        
        const priceText = stock.buyPrice ? '₹' + parseFloat(stock.buyPrice).toLocaleString('en-IN') : 'Price: N/A';
        
        itemDiv.innerHTML = `
          <div class="stock-details">
            <span class="stock-name">
              ${escapeHtml(stock.stockName)}
              <span class="exchange-tag">${escapeHtml(stock.exchange)}</span>
              <span class="category-tag">${escapeHtml(stock.category)}</span>
            </span>
            <span class="stock-price">${priceText}</span>
          </div>
          <button class="btn-danger" onclick="deleteStockItem(${stock.index})">🗑️ Delete</button>
        `;
        listDiv.appendChild(itemDiv);
      });
    }

    function addStockItem() {
      const nameInput = document.getElementById('stockSymbol');
      const priceInput = document.getElementById('buyPrice');
      const exchangeSelect = document.getElementById('exchange');
      const categoryInput = document.getElementById('category');
      
      const name = nameInput.value.trim();
      const price = priceInput.value ? parseFloat(priceInput.value) : '';
      const exchange = exchangeSelect.value;
      const category = categoryInput.value;
      
      if (!name) {
        showToast('⚠️ Stock name is required!', 'warning');
        return;
      }
      
      document.getElementById('loading').style.display = 'flex';
      document.getElementById('stocksListContainer').style.display = 'none';
      
      google.script.run
        .withSuccessHandler(function(response) {
          if (response.success) {
            nameInput.value = '';
            priceInput.value = '';
            showToast('✅ Stock saved successfully!', 'success');
            loadStocksFromSheet();
          } else {
            showToast('❌ Failed to add: ' + response.error, 'danger');
            loadStocksFromSheet();
          }
        })
        .withFailureHandler(function(error) {
          showToast('❌ Error executing write request', 'danger');
          loadStocksFromSheet();
        })
        .addStock(name, price, exchange, category);
    }

    function deleteStockItem(sheetRowIndex) {
      if (!confirm('Are you sure you want to remove this stock?')) return;
      
      document.getElementById('loading').style.display = 'flex';
      document.getElementById('stocksListContainer').style.display = 'none';
      
      google.script.run
        .withSuccessHandler(function(response) {
          if (response.success) {
            showToast('🗑️ Stock deleted from watchlist', 'warning');
            loadStocksFromSheet();
          } else {
            showToast('❌ Failed to delete: ' + response.error, 'danger');
            loadStocksFromSheet();
          }
        })
        .withFailureHandler(function(error) {
          showToast('❌ Error executing delete request', 'danger');
          loadStocksFromSheet();
        })
        .deleteStock(sheetRowIndex);
    }

    function showToast(message, type = 'success') {
      const toast = document.getElementById('toast');
      const toastIcon = document.getElementById('toastIcon');
      const toastMessage = document.getElementById('toastMessage');

      toastMessage.textContent = message;
      
      if (type === 'success') {
        toastIcon.textContent = '✅';
        toast.style.borderLeftColor = 'var(--success)';
      } else if (type === 'danger') {
        toastIcon.textContent = '❌';
        toast.style.borderLeftColor = 'var(--danger)';
      } else if (type === 'warning') {
        toastIcon.textContent = '⚠️';
        toast.style.borderLeftColor = '#f59e0b';
      }

      toast.classList.add('show');
      setTimeout(() => {
        toast.classList.remove('show');
      }, 3500);
    }

    function escapeHtml(unsafe) {
      return unsafe
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }
  </script>
</body>
</html>
